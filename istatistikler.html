<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İstatistikler</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 20px;
    }

    .profile-container {
        text-align: center;
        margin-bottom: 20px;
    }

    .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        margin: 0 auto 10px;
        border: 2px solid #4CAF50;
    }

    .profile-container h2 {
        margin: 0;
    }

    .page-tabs {
        text-align: center;
        margin-bottom: 20px;
    }

    .page-tabs .tab {
        display: inline-block;
        padding: 10px 30px;
        margin: 0 10px;
        background-color: #4CAF50;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .page-tabs .tab:hover {
        background-color: #45a049;
    }

    .page-tabs .tab.active {
        background-color: #2e7d32;
    }

    .charts {
        display: flex;
        flex-direction: column;
        gap: 30px;
        max-width: 800px;
        margin: 30px auto;
    }

    .chart-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .totals {
        max-width: 800px;
        margin: 20px auto;
        padding: 15px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
        font-weight: bold;
        color: #2e7d32;
        cursor: pointer;
        transition: 0.3s;
        cursor: pointer; /* el işareti */
    }

    .totals:hover {
        background-color: #ffffff; /* hafif yeşil parlama */
        transform: scale(1.02);    /* %2 büyüme */
        box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    /* --- LOGOLU TAKIM LİSTESİ --- */
    #teamTotals {
        display:none;
        max-width: 800px;
        margin: 10px auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .team-list {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
    }

    .team-box {
        width: 260px;
        background: #f8f8f8;
        padding: 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .team-box img {
        width: 40px;
        height: 40px;
        object-fit: contain;
    }

    .team-box .info {
        font-size: 14px;
        line-height: 18px;
        font-weight: bold;
        color: #2e7d32;
    }

</style>
</head>
<body>

<div class="profile-container">
    <img src="profil.jpg" alt="Umut Ceylan" class="profile-img">
    <h2>Umut Ceylan</h2>
</div>

<!-- Sekmeler -->
<div class="page-tabs">
    <a href="kariyer.html" class="tab">Kariyer</a>
    <a href="istatistikler.html" class="tab active">İstatistikler</a>
    <a href="index.html" class="tab">Profil</a>
    <a href="kupalar.html" class="tab">Kupalar</a>
    <a href="ballon-dor.html" class="tab">Ballon d'Or</a>
</div>

<!-- Toplam istatistik kutusu -->
<div class="totals" id="totalsBox"></div>

<!-- Logolu takım toplamları -->
<div id="teamTotals">
    <div class="team-list" id="teamList"></div>
</div>

<div class="charts">
    <div class="chart-container">
        <canvas id="statsChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="contributionChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Sezon verileri
const seasons  = ['23/24','24/25','25/26','26/27','27/28','28/29','29/30','30/31','31/32','32/33','33/34','34/35'];
const maclar   = [48,59,60,63,64,62,56,61,49,59,59,56];
const goller   = [35,51,38,68,81,88,74,102,57,86,68,87];
const asistler = [25,50,28,34,37,27,23,40,33,40,23,30];

// Takımlar
const takimlar = [
    "Galatasaray",
    "Realmadrid",
    "Liverpool",
    "Tottenham","Tottenham","Tottenham","Tottenham","Tottenham","Tottenham",
    "Juventus","Juventus","Juventus",
];

// Logolar (dosya adları senin logolarına göre)
const logo = {
    "Galatasaray": "galatasaray.png",
    "Realmadrid": "realmadrid.webp",
    "Liverpool": "liverpool.png",
    "Tottenham": "tottenham.png",
    "Juventus": "juventus.png"
};

// Totaller
document.getElementById("totalsBox").innerText =
    `Toplam: ${maclar.reduce((a,b)=>a+b)} Maç | ${goller.reduce((a,b)=>a+b)} Gol | ${asistler.reduce((a,b)=>a+b)} Asist`;

// Takım toplamlarını hesapla
function takimToplamlari() {
    const toplamlar = {};
    seasons.forEach((sezon, i) => {
        const t = takimlar[i];
        if (!toplamlar[t]) toplamlar[t] = { mac:0, gol:0, asist:0 };
        toplamlar[t].mac   += maclar[i];
        toplamlar[t].gol   += goller[i];
        toplamlar[t].asist += asistler[i];
    });
    return toplamlar;
}

// Logolu kutular oluştur
function guncelleTakimListesi() {
    const data = takimToplamlari();
    const div = document.getElementById("teamList");
    div.innerHTML = "";

    for (const takim in data) {
        div.innerHTML += `
            <div class="team-box">
                <img src="${logo[takim]}">
                <div class="info">
                    ${takim}<br>
                    ${data[takim].mac} Maç | ${data[takim].gol} Gol | ${data[takim].asist} Asist
                </div>
            </div>
        `;
    }
}

// Aç/kapat
const totalsBox = document.getElementById("totalsBox");
const teamTotals = document.getElementById("teamTotals");

totalsBox.addEventListener("click", () => {
    const isHidden = window.getComputedStyle(teamTotals).display === "none";

    if (isHidden) {
        guncelleTakimListesi();
        teamTotals.style.display = "block";
    } else {
        teamTotals.style.display = "none";
    }
});


// Grafikler
const statsCtx = document.getElementById('statsChart').getContext('2d');
new Chart(statsCtx, {
    type: 'line',
    data: {
        labels: seasons,
        datasets: [
            {
                label: 'Goller',
                data: goller,
                borderColor: 'red',
                backgroundColor: 'rgba(255,0,0,0.2)',
                fill: true,
                tension: 0.3
            },
            {
                label: 'Asistler',
                data: asistler,
                borderColor: 'blue',
                backgroundColor: 'rgba(0,0,255,0.2)',
                fill: true,
                tension: 0.3
            }
        ]
    }
});

const katkilar = goller.map((g, i) => ((g + asistler[i]) / maclar[i]).toFixed(2));
const contribCtx = document.getElementById('contributionChart').getContext('2d');

new Chart(contribCtx, {
    type: 'line',
    data: {
        labels: seasons,
        datasets: [{
            label: 'Maç Başına Gole Katkı',
            data: katkilar,
            borderColor: 'green',
            backgroundColor: 'rgba(76,175,80,0.2)',
            fill: true,
            tension: 0.3,
            pointRadius: 5
        }]
    }
});
</script>

</body>
</html>
